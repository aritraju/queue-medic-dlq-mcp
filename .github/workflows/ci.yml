name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project dependencies
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        run: uv run ruff check src/ config/ tests/

      - name: Run unit & integration tests
        run: uv run pytest tests/ -v --tb=short
        env:
          # Tests that invoke the healing agent are skipped when key is absent.
          # Set this secret in your repo Settings → Secrets → Actions.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Use in-memory DuckDB path for CI
          DUCKDB_PATH: ":memory:"
